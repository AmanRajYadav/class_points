name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Lets you redeploy from the Actions tab without pushing a commit — useful
  # after changing the Supabase variables below.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish rather than cancelling it; queue anything newer.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          # Vite inlines these at build time, so they must be present here or
          # the deployed app shows its "Supabase is not configured" screen.
          # The anon key is public by design — it is in the shipped bundle
          # either way, and row level security is what protects the data.
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_TEACHER_EMAIL: ${{ vars.VITE_TEACHER_EMAIL }}
          # Serve from https://<user>.github.io/<repo>/
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Fail if the build did not pick up Supabase credentials
        run: |
          if grep -rq "placeholder.supabase.co" dist/assets; then
            echo "::error::Built without Supabase credentials. Add VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY under Settings -> Secrets and variables -> Actions -> Variables."
            exit 1
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
